<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nucleus — Patient Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;background:#f8fbff;}
/* Left cinematic panel */
.left{background:linear-gradient(135deg,#1a365d 0%,#2c5282 50%,#2b6cb0 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3rem;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.ecg-wrapper{width:100%;height:120px;margin:2rem 0;position:relative;}
svg.ecg{width:100%;height:100%;overflow:visible;}
.ecg-line{fill:none;stroke:rgba(255,255,255,0.7);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.ecg-glow{fill:none;stroke:rgba(99,179,237,0.4);stroke-width:6;stroke-linecap:round;stroke-linejoin:round;filter:blur(4px);}
.dot{width:12px;height:12px;border-radius:50%;background:#68d391;box-shadow:0 0 12px #68d391;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
@keyframes dashMove{from{stroke-dashoffset:800}to{stroke-dashoffset:0}}
.ecg-animated{stroke-dasharray:800;stroke-dashoffset:800;animation:dashMove 3s linear infinite;}
.left-brand{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-0.5px;text-shadow:0 2px 20px rgba(0,0,0,0.3);}
.left-sub{font-size:0.95rem;color:rgba(255,255,255,0.65);margin-top:0.5rem;text-align:center;max-width:280px;line-height:1.6;}
.stat-row{display:flex;gap:2rem;margin-top:2.5rem;}
.stat{text-align:center;}
.stat-num{font-size:1.8rem;font-weight:800;color:#fff;}
.stat-label{font-size:0.72rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;}
/* Right form panel */
.right{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3rem;background:#f8fbff;}
.form-card{width:100%;max-width:400px;}
.form-title{font-size:1.9rem;font-weight:800;color:#1a365d;margin-bottom:0.4rem;}
.form-sub{color:#718096;font-size:0.95rem;margin-bottom:2.5rem;}
.field{margin-bottom:1.5rem;}
.field label{display:block;font-size:0.8rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem;}
.field input{width:100%;padding:0.9rem 1.1rem;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:0.95rem;color:#2d3748;outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.field input:focus{border-color:#3182ce;box-shadow:0 0 0 3px rgba(49,130,206,0.12);}
.submit-btn{width:100%;padding:1rem;border-radius:12px;border:none;background:linear-gradient(135deg,#2c5282,#3182ce);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;letter-spacing:0.03em;}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(49,130,206,0.35);}
.submit-btn:active{transform:translateY(0);}
.error-box{background:#fff5f5;border:1px solid #feb2b2;color:#c53030;padding:0.85rem 1rem;border-radius:10px;font-size:0.88rem;font-weight:600;margin-bottom:1.5rem;display:none;}
.back-link{display:block;text-align:center;margin-top:1.5rem;color:#718096;font-size:0.88rem;text-decoration:none;}
.back-link:hover{color:#3182ce;}
@media(max-width:768px){body{grid-template-columns:1fr;}.left{display:none;}}
</style>
</head>
<body>
<div class="left">
  <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
    <div class="dot"></div>
    <span class="left-brand">NUCLEUS HEALTH</span>
  </div>
  <p class="left-sub">Your digital health companion. View records, track your queue, and stay informed.</p>
  <div class="ecg-wrapper">
    <svg class="ecg" viewBox="0 0 500 100" preserveAspectRatio="none">
      <polyline class="ecg-glow ecg-animated" points="0,60 60,60 80,60 90,20 100,80 110,10 120,70 140,60 200,60 220,60 230,25 240,75 250,15 260,65 280,60 340,60 360,60 370,25 380,75 390,15 400,65 420,60 500,60"/>
      <polyline class="ecg-line ecg-animated" points="0,60 60,60 80,60 90,20 100,80 110,10 120,70 140,60 200,60 220,60 230,25 240,75 250,15 260,65 280,60 340,60 360,60 370,25 380,75 390,15 400,65 420,60 500,60"/>
    </svg>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-num">24/7</div><div class="stat-label">Access</div></div>
    <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Secure</div></div>
    <div class="stat"><div class="stat-num">Live</div><div class="stat-label">Queue</div></div>
  </div>
</div>

<div class="right">
  <div class="form-card">
    <div class="form-title">Patient Access</div>
    <div class="form-sub">Enter your token and name to view your health records</div>
    <div class="error-box" id="errorBox"></div>
    <form id="loginForm">
      {% csrf_token %}
      <div class="field">
        <label>Full Name</label>
        <input type="text" name="pname" placeholder="As registered at the hospital" required autocomplete="name">
      </div>
      <div class="field">
        <label>Token Number</label>
        <input type="text" name="token" placeholder="e.g. OP-001" required autocomplete="off">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">ACCESS MY DASHBOARD</button>
    </form>
    <a href="/" class="back-link">← Back to Home / Book appointment</a>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  btn.textContent = 'Verifying...';
  btn.disabled = true;
  errorBox.style.display = 'none';
  try {
    const res = await fetch('{% url "patient_login" %}', {method:'POST', body: new FormData(e.target)});
    const data = await res.json();
    if (data.ok) { window.location.href = data.redirect; }
    else { errorBox.textContent = data.message; errorBox.style.display = 'block'; btn.textContent = 'ACCESS MY DASHBOARD'; btn.disabled = false; }
  } catch(err) { errorBox.textContent = 'Connection error. Please try again.'; errorBox.style.display = 'block'; btn.textContent = 'ACCESS MY DASHBOARD'; btn.disabled = false; }
});
</script>
</body>
</html>
