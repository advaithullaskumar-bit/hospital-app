{% extends 'backend_app/admin_layout.html' %}

{% block page_title %}Clinical Observation{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; padding: 3rem;">
    <h2 style="font-weight: 800; color: var(--text-dark); margin-bottom: 2rem; text-align: center;">Record Vital Metrics
    </h2>

    <form method="post">
        {% csrf_token %}

        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: #718096;">Select
                    Patient</label>
                <select name="patient_profile" class="neu-btn" style="width: 100%; text-align: left; padding: 1rem;"
                    required>
                    {% for p in patients %}
                    <option value="{{ p.id }}" {% if request.GET.patient==p.id|stringformat:"i" %}selected{% endif %}>{{
                        p.patient_name }} (ID: {{ p.id }})</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: #718096;">Metric
                        Type</label>
                    <select id="metricType" name="metric_type" class="neu-btn"
                        style="width: 100%; text-align: left; padding: 1rem;" required onchange="updateUnit()">
                        <option value="heart_rate" data-unit="bpm">Heart Rate</option>
                        <option value="blood_pressure" data-unit="mmHg">Blood Pressure</option>
                        <option value="temperature" data-unit="°F">Body Temperature</option>
                        <option value="oxygen_level" data-unit="%">SpO2 Level</option>
                        <option value="blood_sugar" data-unit="mg/dL">Blood Sugar</option>
                        <option value="weight" data-unit="kg">Weight</option>
                    </select>
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: #718096;">Value</label>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="number" step="0.1" name="value" class="neu-btn" style="width: 100%; padding: 1rem;"
                            required>
                        <input type="text" id="unitDisplay" name="unit" class="neu-btn"
                            style="width: 80px; padding: 1rem; text-align: center;" value="bpm" readonly>
                    </div>
                </div>
            </div>

            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: #718096;">Clinical Notes
                    (Optional)</label>
                <textarea name="notes" rows="3" class="neu-btn" style="width: 100%; padding: 1rem; border-radius: 12px;"
                    placeholder="e.g. Taken after resting for 5 mins"></textarea>
            </div>

            <button type="submit" class="neu-btn"
                style="width: 100%; justify-content: center; margin-top: 2rem; background: var(--accent-red); color: white; border: none; font-size: 1.1rem; padding: 1.2rem;">
                RECORD TO DASHBOARD
            </button>
        </div>
    </form>
</div>

<script>
    function updateUnit() {
        const sel = document.getElementById('metricType');
        const unit = sel.options[sel.selectedIndex].getAttribute('data-unit');
        document.getElementById('unitDisplay').value = unit;
    }
</script>
{% endblock %}
